<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privi</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0b0f;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 560px;
      padding: 28px;
    }

    h1 {
      font-size: 46px;
      line-height: 1.12;
      margin: 0 0 22px;
      font-weight: 800;
    }

    p {
      color: #aaa;
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }

    .cta {
      margin-top: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    input {
      box-sizing: border-box;
      padding: 14px 16px;
      width: 100%;
      max-width: 360px;
      border-radius: 10px;
      border: 1px solid #333;
      font-size: 16px;
    }

    button {
      padding: 14px 22px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #777;
      text-align: center;
      width: 100%;
    }

    .success {
      display: none;
      margin-top: 30px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
    }

    .success span {
      display: block;
      margin-top: 8px;
      color: #aaa;
      font-size: 15px;
      font-weight: 400;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 38px;
      }

      p {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Send anything you shouldn’t text or email.</h1>

    <p>
      Send private photos, videos, or files that disappear after viewing.<br/>
      No saving. No forwarding. No control lost.
    </p>

    <div class="cta">
      <form id="signup-form" action="https://formspree.io/f/mvzlgdgr" method="POST">
        <input type="hidden" name="_subject" value="New Privi signup!" />
        <input type="email" name="email" placeholder="Enter your email" required />
        <button type="submit">Get early access</button>
      </form>

      <div class="note">
        No spam. No noise. Just the launch.
      </div>

      <div class="success" id="success-message">
        You're in.
        <span>We’ll notify you when Privi launches.</span>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("signup-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
          "Accept": "application/json"
        }
      });

      if (response.ok) {
        form.style.display = "none";
        successMessage.style.display = "block";
      } else {
        alert("Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
