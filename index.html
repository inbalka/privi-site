<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privi</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #0b0b0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    } 
    .container {
      max-width: 500px;
      padding: 20px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      font-size: 18px;
      line-height: 1.5;
    }
    .cta {
      margin-top: 30px;
    }
    input {
      padding: 12px;
      width: 70%;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }
    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Send anything you shouldn’t text or email.</h1>
    <p>
  Send private photos, videos, or files that disappear after viewing.<br/>
  No saving. No forwarding. No control lost.
    </p>
    
  <div class="cta">
  <form action="https://formspree.io/f/mvzlgdgr" method="POST">
    <input type="hidden" name="_subject" value="New Privi signup!" />
    <input type="hidden" name="_redirect" value="https://useprivi.com/thanks.html" />
    <input type="email" name="email" placeholder="Enter your email" required />
    <button type="submit">Get early access</button>
  </form>
  </div>
  
</div>

    <div class="note">
      Be the first to try Privi.
    </div>
  </div>
</body>
</html>
